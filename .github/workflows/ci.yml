name: CI

on:
  push:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build Reason
        run: "echo ref: ${{ github.ref }} event: ${{ github.event_name }}"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build Version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(deno eval "const pkg = JSON.parse(await Deno.readTextFile('deno.json')); console.log(pkg.version);")
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "### Version: $version" >> "$GITHUB_STEP_SUMMARY"

      - name: Code Style
        run: deno fmt --check .

      - name: Type Check
        run: deno task check

      - name: Publish Dry Run
        run: deno publish --dry-run --set-version ${{ steps.version.outputs.version }}

  jsr:
    runs-on: ubuntu-24.04
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish Release Package
        run: deno publish --set-version ${{ needs.check.outputs.version }}
